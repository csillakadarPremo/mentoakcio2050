<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENTŐAKCIÓ 2050</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:Arial,sans-serif;

    background:
    linear-gradient(135deg,#f8fafc,#ecfccb,#dcfce7);

    overflow:hidden;
}

/* háttér glow */
body::before{
    content:"";
    position:absolute;

    width:400px;
    height:400px;

    background:
    radial-gradient(circle,
    rgba(34,197,94,0.14),
    transparent 70%);

    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;

    width:300px;
    height:300px;

    background:
    radial-gradient(circle,
    rgba(251,191,36,0.12),
    transparent 70%);

    bottom:-120px;
    right:-120px;
}

/* fő card */
.card{
    position:relative;
    z-index:2;

    width:100%;
    max-width:430px;

    background:rgba(255,255,255,0.82);

    backdrop-filter:blur(10px);

    border-radius:28px;

    padding:28px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.12);

    overflow:hidden;
}

/* rácsvonalak */
.lines{
    position:absolute;
    inset:0;

    opacity:0.05;

    background-image:
    linear-gradient(to right,#166534 1px,transparent 1px),
    linear-gradient(to bottom,#166534 1px,transparent 1px);

    background-size:32px 32px;

    pointer-events:none;
}

/* dekor kép */
.image-wrap{
    position:absolute;

    right:-50px;
    top:20px;

    opacity:0.08;

    pointer-events:none;
}

.image-wrap img{
    width:180px;
    transform:rotate(-12deg);
}

/* cím */
h1{
    text-align:center;

    font-size:34px;

    color:#166534;

    margin-bottom:10px;

    line-height:1.2;
}

/* alcím */
.subtitle{
    text-align:center;

    color:#475569;

    font-size:14px;

    margin-bottom:35px;

    letter-spacing:1px;
}

/* FŐ KÓD */
.hint{
    text-align:center;

    font-size:34px;

    letter-spacing:6px;

    color:#15803d;

    font-weight:bold;

    margin:35px 0;

    padding:24px 0;

    border-top:2px solid rgba(21,128,61,0.15);
    border-bottom:2px solid rgba(21,128,61,0.15);

    text-shadow:
    0 0 10px rgba(34,197,94,0.22);
}

/* lista */
ul{
    padding-left:20px;

    font-size:18px;

    line-height:1.8;

    color:#1e293b;
}

/* warning */
.warning{
    margin-top:30px;

    text-align:center;

    font-size:20px;

    font-weight:bold;

    color:#b45309;

    letter-spacing:1px;
}

/* mobil finomhangolás */
@media (max-width:480px){

    h1{
        font-size:28px;
    }

    .hint{
        font-size:28px;
        letter-spacing:4px;
    }

    ul{
        font-size:16px;
    }

    .warning{
        font-size:18px;
    }

    .image-wrap img{
        width:140px;
    }
}

</style>
</head>

<body>

<div class="card">

<div class="lines"></div>

<div class="image-wrap">
    <img src="egészség-mérleg.jpg">
</div>

<h1>⚖️ MENTŐAKCIÓ 2050 ⚖️</h1>

<div class="subtitle">
VÁLSÁGKEZELŐ EGYSÉG – TITKOS DEKÓDOLÁS
</div>

<div class="hint">
__ ________ _______ ______
</div>

<ul>
<li>A gyógymód nem tabletta vagy vakcina.</li>
<li>Minden ember naponta alakítja.</li>
<li>A megszerzett betűk segítenek megfejteni.</li>
<li>Az egyensúly dönti el a jövőt.</li>
</ul>

<div class="warning">
RAKJÁTOK ÖSSZE A BETŰKET!
</div>

</div>

</body>
</html>
