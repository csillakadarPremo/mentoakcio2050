<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENTŐAKCIÓ 2050</title>

<style>

*{
    box-sizing:border-box;
    max-width:100%;
}

html,body{
    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    overscroll-behavior:none;

    font-family:Arial,sans-serif;
}

body{

    position:fixed;

    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:5vw;

    background:
    linear-gradient(135deg,#f8fafc,#ecfccb,#dcfce7);
}
body::before,
body::after{
    pointer-events:none;
    overflow:hidden;
}
/* háttér glow */
body::before{
    content:"";
    position:fixed;

    width:45vw;
    height:45vw;

    background:
    radial-gradient(circle,
    rgba(34,197,94,0.14),
    transparent 70%);

    top:-20vw;
    left:-20vw;

    pointer-events:none;
}

body::after{
    content:"";
    position:fixed;

    width:40vw;
    height:40vw;

    background:
    radial-gradient(circle,
    rgba(251,191,36,0.12),
    transparent 70%);

    bottom:-15vw;
    right:-15vw;

    pointer-events:none;
}

/* card */
.card{

    position:relative;

    width:min(92vw, 42rem);

    background:rgba(255,255,255,0.82);

    backdrop-filter:blur(10px);

    border-radius:2rem;

    padding:8vw;

    box-shadow:
    0 1rem 3rem rgba(0,0,0,0.12);

    overflow:hidden;
}

/* rácsvonalak */
.lines{
    position:absolute;
    inset:0;

    opacity:0.05;

    background-image:
    linear-gradient(to right,#166534 1px,transparent 1px),
    linear-gradient(to bottom,#166534 1px,transparent 1px);

    background-size:2rem 2rem;

    pointer-events:none;
}

/* dekor kép */
.image-wrap{

    position:absolute;

    right:-8%;
    top:3%;

    opacity:0.08;

    pointer-events:none;
}

.image-wrap img{

    width:35vw;
    max-width:12rem;

    transform:rotate(-12deg);
}

/* cím */
h1{

    text-align:center;

    font-size:clamp(1.8rem, 5vw, 3rem);

    color:#166534;

    margin-bottom:0.8rem;

    line-height:1.2;
}

/* alcím */
.subtitle{

    text-align:center;

    color:#475569;

    font-size:clamp(0.8rem, 2.8vw, 1rem);

    margin-bottom:2rem;

    letter-spacing:0.08em;
}

/* fő kód */
.hint{

    text-align:center;

    font-size:clamp(1.8rem, 7vw, 3.5rem);

    letter-spacing:0.18em;

    color:#15803d;

    font-weight:bold;

    margin:2.5rem 0;

    padding:1.5rem 0;

    border-top:2px solid rgba(21,128,61,0.15);
    border-bottom:2px solid rgba(21,128,61,0.15);

    text-shadow:
    0 0 0.8rem rgba(34,197,94,0.22);

    word-break:break-word;
}

/* lista */
ul{

    padding-left:1.2rem;

    font-size:clamp(1rem, 3.5vw, 1.3rem);

    line-height:1.8;

    color:#1e293b;
}

/* warning */
.warning{

    margin-top:2rem;

    text-align:center;

    font-size:clamp(1rem, 4vw, 1.5rem);

    font-weight:bold;

    color:#b45309;

    letter-spacing:0.08em;
}
    

/* nagyon alacsony kijelzők */
@media (max-height:700px){

    body{
        align-items:flex-start;
        padding-top:6vh;
        padding-bottom:6vh;
    }
}

</style>
</head>

<body>

<div class="card">

<div class="lines"></div>

<div class="image-wrap">
    <img src="egészség-mérleg.jpg">
</div>

<h1>⚖️ MENTŐAKCIÓ 2050 ⚖️</h1>

<div class="subtitle">
VÁLSÁGKEZELŐ EGYSÉG – TITKOS DEKÓDOLÁS
</div>

<div class="hint">
__ ________ _______ ______
</div>

<ul>
<li>A gyógymód nem tabletta vagy vakcina.</li>
<li>Minden ember naponta alakítja.</li>
<li>A megszerzett betűk segítenek megfejteni.</li>
<li>Az egyensúly dönti el a jövőt.</li>
</ul>

<div class="warning">
RAKJÁTOK ÖSSZE A BETŰKET!
</div>

</div>

</body>
</html>
