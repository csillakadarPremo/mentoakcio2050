<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENTŐAKCIÓ 2050</title>

<style>

*{
    box-sizing:border-box;
    max-width:100%;
}

html,body{
    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:Arial,sans-serif;
}

body{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#f8fafc,#ecfccb,#dcfce7);
}

/* glow */
body::before{
    content:"";
    position:absolute;

    width:45vw;
    height:45vw;

    background:
    radial-gradient(circle,
    rgba(34,197,94,0.12),
    transparent 70%);

    top:-10vw;
    left:-10vw;
}

body::after{
    content:"";
    position:absolute;

    width:40vw;
    height:40vw;

    background:
    radial-gradient(circle,
    rgba(251,191,36,0.12),
    transparent 70%);

    bottom:-10vw;
    right:-10vw;
}

/* card */
.card{

    position:relative;

    width:min(92vw,30rem);

    background:rgba(255,255,255,0.82);

    backdrop-filter:blur(10px);

    border-radius:2rem;

    padding:3rem 2rem;

    text-align:center;

    box-shadow:
    0 1rem 3rem rgba(0,0,0,0.12);

    overflow:hidden;
}

/* háttér grid */
.lines{
    position:absolute;
    inset:0;

    opacity:0.05;

    background-image:
    linear-gradient(to right,#166534 1px,transparent 1px),
    linear-gradient(to bottom,#166534 1px,transparent 1px);

    background-size:2rem 2rem;

    pointer-events:none;
}

.title{

    font-size:clamp(1.4rem,4vw,2rem);

    color:#166534;

    margin-bottom:1rem;

    font-weight:bold;
}

.subtitle{

    color:#475569;

    margin-bottom:2.5rem;

    font-size:0.95rem;

    letter-spacing:0.08em;
}

/* DINAMIKUS BETŰK */
.code{

    font-size:clamp(3rem,12vw,6rem);

    font-weight:bold;

    color:#15803d;

    letter-spacing:0.2em;

    text-shadow:
    0 0 1rem rgba(34,197,94,0.22);

    padding:1.5rem 0;

    border-top:2px solid rgba(21,128,61,0.15);
    border-bottom:2px solid rgba(21,128,61,0.15);
}

.footer{

    margin-top:2rem;

    color:#b45309;

    font-weight:bold;

    letter-spacing:0.08em;
}

</style>
</head>

<body>

<div class="card">

<div class="lines"></div>

<div class="title">
⚖️ ÁLLOMÁS FELFEDEZVE ⚖️
</div>

<div class="subtitle">
MEGSZERZETT KARAKTEREK
</div>

<div class="code" id="dynamicCode">
...
</div>

<div class="footer">
JEGYEZZÉTEK FEL!
</div>

</div>

<script>

/* URL paraméterek */
const params = new URLSearchParams(window.location.search);

/* c paraméter */
let code = params.get("c");

/* ha nincs */
if(!code){
    code = "???";
}

/* nagybetű */
code = code.toUpperCase();

/* megjelenítés */
document.getElementById("dynamicCode").innerText = code;

</script>

</body>
</html>
